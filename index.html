<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Khairat Kematian Surau Al-Ikhlas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tetapan ini menyembunyikan butang Hantar dan butang Cetak apabila ia diprint/disimpan sebagai PDF supaya dokumen nampak profesional */
        @media print {
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 p-6 font-sans">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded shadow-md">
        <h1 class="text-2xl font-bold text-center mb-2">Tabung Khairat Kematian</h1>
        <h2 class="text-xl text-center text-gray-700 mb-6">Surau Al-Ikhlas, Bandar Baru Bangi</h2>

        <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 text-sm">
            <p class="font-bold">Maklumat Pembayaran:</p>
            <p>Bank: BANK ISLAM<br>
            No. Akaun: 12029010026427<br>
            Sila buat bayaran sebelum mengisi borang ini.</p>
        </div>

        <!-- Tag form yang telah dibaiki untuk Netlify -->
        <form id="borangKhairat" name="borang-khairat" method="POST" netlify enctype="multipart/form-data" class="space-y-4">
            
            <input type="hidden" name="senarai_tanggungan_lengkap" id="senarai_tanggungan_lengkap">

            <h3 class="font-semibold text-lg border-b pb-2 text-gray-800">Maklumat Pemohon</h3>
            
            <div>
                <label class="block text-sm font-medium">Tujuan Borang</label>
                <select name="tujuan" required class="mt-1 block w-full border border-gray-300 rounded p-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="Pendaftaran Baru">Pendaftaran Baru</option>
                    <option value="Kemaskini Data">Kemaskini Data</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium">Nama Penuh</label>
                <input type="text" name="nama" required class="mt-1 block w-full border border-gray-300 rounded p-2">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium">No. KP</label>
                    <input type="text" name="nokp" required class="mt-1 block w-full border border-gray-300 rounded p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium">No. Telefon</label>
                    <input type="tel" name="telefon" required class="mt-1 block w-full border border-gray-300 rounded p-2">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium">Alamat Rumah</label>
                <textarea name="alamat" rows="2" required class="mt-1 block w-full border border-gray-300 rounded p-2"></textarea>
            </div>

            <h3 class="font-semibold text-lg border-b pb-2 mt-6 text-gray-800">Maklumat Tanggungan</h3>
            
            <div id="bekas-tanggungan" class="space-y-3">
                <div class="tanggungan-item grid grid-cols-1 md:grid-cols-4 gap-2 bg-gray-50 p-3 rounded border border-gray-200">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-medium text-gray-600">Nama Tanggungan</label>
                        <input type="text" class="nama-t input-dinamis mt-1 block w-full border border-gray-300 rounded p-2 text-sm" placeholder="Nama penuh">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">No. KP / Surat Beranak</label>
                        <input type="text" class="kp-t input-dinamis mt-1 block w-full border border-gray-300 rounded p-2 text-sm" placeholder="Contoh: 050101101234">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Hubungan</label>
                        <input type="text" class="hub-t input-dinamis mt-1 block w-full border border-gray-300 rounded p-2 text-sm" placeholder="Isteri / Anak">
                    </div>
                </div>
            </div>

            <button type="button" onclick="tambahTanggungan()" class="no-print text-sm bg-blue-100 hover:bg-blue-200 text-blue-700 font-semibold py-1 px-3 rounded inline-flex items-center mt-2">
                + Tambah Tanggungan
            </button>

            <h3 class="font-semibold text-lg border-b pb-2 mt-6 text-gray-800">Pembayaran & Resit</h3>
            
            <div>
                <label class="block text-sm font-medium">Pilihan Yuran</label>
                <select name="pilihan_yuran" required class="mt-1 block w-full border border-gray-300 rounded p-2 focus:ring-blue-500">
                    <option value="Tahun 2026 - Pendaftaran Baru (RM40)">Tahun 2026: RM40 (Pendaftaran RM10 + Tahunan RM30)</option>
                    <option value="Tahun 2026 - Ahli Sedia Ada (RM30)">Tahun 2026: RM30 (Yuran Tahunan Sahaja)</option>
                    <option value="Tahun 2027 dan ke atas (RM50)">Tahun 2027 & Seterusnya: RM50 (Pendaftaran & Tahunan)</option>
                </select>
            </div>

            <div class="no-print">
                <label class="block text-sm font-medium">Muat Naik Resit Bayaran</label>
                <input type="file" name="resit_bayaran" accept="image/*,application/pdf" required class="mt-1 block w-full border border-gray-300 rounded p-2 bg-gray-50">
                <p class="text-xs text-gray-500 mt-1">Format dibenarkan: JPG, PNG, PDF (Maksimum 10MB)</p>
            </div>

            <div class="mt-6">
                <label class="flex items-start">
                    <input type="checkbox" required class="mt-1 mr-2">
                    <span class="text-sm text-gray-700">Saya dengan ini bersetuju menyertai Tabung Khairat Kematian Surau Al-Ikhlas, Bandar Baru Bangi dan mengikut peraturan-peraturan yang telah di tetapkan.</span>
                </label>
            </div>

            <!-- BUTANG HANTAR (Hijau) -->
            <button type="submit" class="no-print w-full bg-green-600 text-white font-bold py-3 px-4 rounded hover:bg-green-700 mt-6 shadow-lg transition-colors">Hantar Pendaftaran</button>
            
            <!-- BUTANG CETAK PDF (Kelabu) -->
            <button type="button" onclick="window.print()" class="no-print w-full bg-gray-500 text-white font-bold py-3 px-4 rounded hover:bg-gray-600 mt-3 shadow-lg transition-colors">
                Cetak / Simpan Salinan PDF (Sebelum Hantar)
            </button>

        </form>
    </div>

    <!-- Script JavaScript -->
    <script>
        function tambahTanggungan() {
            const bekas = document.getElementById('bekas-tanggungan');
            const htmlBaru = `
                <div class="tanggungan-item grid grid-cols-1 md:grid-cols-4 gap-2 bg-gray-50 p-3 rounded border border-gray-200 mt-2 relative">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-medium text-gray-600">Nama Tanggungan</label>
                        <input type="text" class="nama-t input-dinamis mt-1 block w-full border border-gray-300 rounded p-2 text-sm" placeholder="Nama penuh">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">No. KP / Surat Beranak</label>
                        <input type="text" class="kp-t input-dinamis mt-1 block w-full border border-gray-300 rounded p-2 text-sm" placeholder="Contoh: 050101101234">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Hubungan</label>
                        <div class="flex gap-2">
                            <input type="text" class="hub-t input-dinamis mt-1 block w-full border border-gray-300 rounded p-2 text-sm" placeholder="Isteri / Anak">
                            <button type="button" onclick="padamTanggungan(this)" class="no-print mt-1 bg-red-100 hover:bg-red-200 text-red-600 px-3 rounded font-bold" title="Padam">X</button>
                        </div>
                    </div>
                </div>
            `;
            bekas.insertAdjacentHTML('beforeend', htmlBaru);
        }

        function padamTanggungan(butang) {
            butang.closest('.tanggungan-item').remove();
        }

        document.getElementById('borangKhairat').addEventListener('submit', function(e) {
            let senaraiTeks = '';
            const items = document.querySelectorAll('.tanggungan-item');
            
            items.forEach((item, index) => {
                const nama = item.querySelector('.nama-t').value.trim();
                const kp = item.querySelector('.kp-t').value.trim();
                const hub = item.querySelector('.hub-t').value.trim();
                
                if(nama !== '' || kp !== '') {
                    senaraiTeks += `${index + 1}. Nama: ${nama} | KP: ${kp} | Hubungan: ${hub}\n`;
                }
            });

            if(senaraiTeks === '') {
                senaraiTeks = 'Tiada tanggungan direkodkan.';
            }
            document.getElementById('senarai_tanggungan_lengkap').value = senaraiTeks;
        });
    </script>
</body>
</html>
